    { name = "flake8", marker = "sys_platform != 'win32'" },
]

[package.dev-dependencies]
dev = [
    { name = "poethepoet", marker = "sys_platform != 'win32'" },
    { name = "pyrefly", marker = "sys_platform != 'win32'" },
    { name = "ruff", marker = "sys_platform != 'win32'" },
]
test = [
    { name = "anyio", marker = "sys_platform != 'win32'" },
    { name = "pytest", marker = "sys_platform != 'win32'" },
    { name = "pytest-cov", marker = "sys_platform != 'win32'" },
    { name = "pytest-timeout", marker = "sys_platform != 'win32'" },
    { name = "pytest-xdist", marker = "sys_platform != 'win32'" },
]

