line-length = 88
unsafe-fixes = true
target-version = "py314"
extend-exclude = [
    "**/.agents",
    "**/.omp",
    "**/_version.py",
]

[lint]
select = ["ALL"]
fixable = [
    "D",
    "UP",
    'F401',   # unused imports
    "F522",   # string-dot-format-extra-named-arguments
    "F541",   # f-string-missing-placeholders
    "W292",   # no-new-line-at-end-of-file
    "E711",   # none-comparison
    "E712",   # true-false-comparison
    "E713",   # not-in-test
    "E714",   # not-is-test
    "I001",   # unsorted-imports
    "UP037",  # quoted-annotation
    "W293",   # blank-line-with-whitespace
    "RSE102", # unnecessary-paren-on-raise-exception
    "I002",   #	missing-required-import
    "RUF100", # unused-noqa
    "TC003",  # typing-only-standard-library-import
    "UP034",  # extraneous-parentheses
    "RUF005", # unpack-instead-of-concatenating-to-collection-literal
    "C401",   # unnecessary-generator-set
    "W292",   # no-new-line-at-end-of-file
    "W291",   # trailing-whitespace
    "RUF010", # explicit-f-string-type-conversion
    "FLY002", # static-join-to-f-string
    "PT",
    "SIM",
    "RUF022", # unsorted-dunder-all
    "RUF023", # unsorted-dunder-slots
    "RUF101", # redirected-noqa
]
ignore = [
    'TD',      # flake8-todos
    "EM101",   # raw-string-in-exception
    "TRY003",  # raise-vanilla-args
    "ANN401",  # dynamically-typed-expression
    "FBT002",  # boolean-default-value-in-function-definition
    "PGH003",  # blanket-type-ignore
    "SIM117",  # multiple-with-statements # python3.8
    "B905",    # zip-without-explicit-strict
    "PD010",   # use-of-dot-pivot-or-unstack
    "TD",      # flake8-todos
    "FIX",     # flake8-fixme
    "D101",    # undocumented-public-class
    "PLR2044", # empty-comment
    # ruff format
    "W191",   # tab-indentation
    "E111",   # indentation-with-invalid-multiple
    "E114",   # indentation-with-invalid-multiple-comment
    "E117",   # over-indented
    "D206",   # indent-with-spaces
    "D300",   # triple-single-quotes
    "Q000",   # bad-quotes-inline-string
    "Q001",   # bad-quotes-multiline-string
    "Q002",   # bad-quotes-docstring
    "Q003",   # avoidable-escaped-quote
    "COM812", # missing-trailing-comma
    "COM819", # prohibited-trailing-comma
    "ISC001", # single-line-implicit-string-concatenation
    "ISC002", # multi-line-implicit-string-concatenation
    "A005",   # stdlib-module-shadowing
    # pydocstyle # google default
    "D203",
    "D204",
    "D213",
    "D215",
    "D400",
    "D401",
    "D404",
    "D406",
    "D407",
    "D408",
    "D409",
    "D413",
    # pydocstyle # ignore
    "D212", # multi-line-summary-first-line
    "D403", # first-line-capitalized
    "D415", # ends-in-punctuation
    "D107", # undocumented-public-init
    "D105", # undocumented-magic-method
    # pydocstyle # TODO
    "D100", # undocumented-public-module
    "D104", # undocumented-public-package
]
task-tags = ["TODO", "FIXME", "XXX", "COMMENT", "fixme", "comment"]
external = ["AGT"]

[lint.per-file-ignores]
"./**/src/tests/**/*.py" = ["D101", "D102", "D103", "FBT001"]
"./**/conftest.py" = ["D101", "D102", "D103", "S", "ANN201", "E402", "PLR"]
"./**/src/tests/**/test_*.py" = [
    "S",
    "ANN201",
    "PLR2004",
    "TC002",
    "PLR0912",
    "PLR0915",
    "C901",
]

[format]
indent-style = "space"
preview = true
quote-style = "double"
skip-magic-trailing-comma = true
docstring-code-format = true
docstring-code-line-length = "dynamic"
line-ending = 'auto'

[lint.pylint]
max-args = 10

[lint.isort]
known-local-folder = ["flake8_agents", "tests"]
# ruff format
force-single-line = false
force-wrap-aliases = false
split-on-trailing-comma = false

[lint.pydocstyle]
convention = "google"

[lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions"]
