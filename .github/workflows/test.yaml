name: test

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "**.pyi"
      - ".github/workflows/test.yaml"
      - "pyproject.toml"
      - "ruff.toml"
      - "pyrefly.toml"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        task:
          - name: pytest
            cmd: uv run pytest -v
        include:
          - python-version: "3.10"
            task:
              name: lint
              cmd: uv run poe lint

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    name: ${{ matrix.python-version }}-${{ matrix.task.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        id: setup-python
        run: |
          uv python install ${{ matrix.python-version }}
          uv python pin ${{ matrix.python-version }}
          uv lock
          PY=$(uv run python -VV | shasum -a 256 | cut -d' ' -f1)
          echo PY: $PY
          echo "PY=$PY" >> "$GITHUB_OUTPUT"

      - name: Restore uv cache
        uses: actions/cache@v5
        id: uv-cache
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ steps.setup-python.outputs.PY }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ steps.setup-python.outputs.PY }}-${{ hashFiles('uv.lock') }}
            uv-${{ steps.setup-python.outputs.PY }}

      - name: Install dependencies
        if: steps.uv-cache.outputs.cache-hit != 'true'
        run: uv sync

      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}

      - name: Minimize uv cache
        run: uv cache prune --ci
